
[workspace]
resolver = '2'
members = [
	'packages/c2pa-wasm',
	'packages/c2pa-types',
]

[workspace.package]
rust-version = "1.88.0"

[workspace.dependencies]
# TEMPORARY: tracking c2pa-rs PR #2231 (https://github.com/contentauth/c2pa-rs/pull/2231),
# which splits out the `c2pa_raw_crypto` crate. Revert to a published crates.io
# version (`version = "=0.86.x"`) once that change is released. Do not merge while
# this points at a branch.
c2pa = { git = "https://github.com/contentauth/c2pa-rs.git", branch = "split-out-c2pa-raw-crypto-take-2", features = ["pdf", "rust_native_crypto", "fetch_remote_manifests", "json_schema", "http_reqwest"], default-features = false }

[profile.release]
opt-level = "s"
lto = true
