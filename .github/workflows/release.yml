name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write # Required for OIDC (trusted publishing)
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: ./.github/actions/install-dependencies
        name: Install dependencies

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm ci:release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-node-binaries:
    needs: release
    if: |
      needs.release.outputs.published == 'true' &&
      contains(needs.release.outputs.publishedPackages, '@contentauth/c2pa-node')
    name: Build native binary for ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    env:
      COREPACK_ENABLE_STRICT: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Install system deps (aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: llvm-tools-preview
          target: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Install Node.js dependencies
        env:
          SKIP_RUST_BUILD: 1
        run: pnpm install --frozen-lockfile

      - name: Build library (aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: packages/c2pa-node
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: pnpm run build:rust --target=${{ matrix.target }}

      - name: Build library
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        working-directory: packages/c2pa-node
        run: pnpm run build:rust --target=${{ matrix.target }}

      - name: Package artifact
        id: package-artifact
        shell: bash
        working-directory: packages/c2pa-node
        env:
          PUBLISHED_VERSION: ${{ fromJson(needs.release.outputs.publishedPackages)[0].version }}
          ARCHIVE_FILENAME: c2pa-node_${{ matrix.target }}-v${{ fromJson(needs.release.outputs.publishedPackages)[0].version }}.zip
        run: |
          mkdir -p generated
          cp index.node generated/
          cd generated
          7z a -tzip "${{ env.ARCHIVE_FILENAME }}" index.node
          echo "archive=${{ env.ARCHIVE_FILENAME }}" >> "$GITHUB_OUTPUT"

      - id: get-release-id
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_VERSION: ${{ fromJson(needs.release.outputs.publishedPackages)[0].version }}
        run: |
          echo "id=$(curl -s -L \
            -H 'Accept: application/vnd.github+json' \
            -H 'Authorization: Bearer ${{ env.GITHUB_TOKEN }}' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ env.PUBLISHED_VERSION }} | jq '.id')" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ env.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/zip" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.get-release-id.outputs.id }}/assets?name=${{ steps.package-artifact.outputs.archive }}" \
            --data-binary "@packages/c2pa-node/generated/${{ steps.package-artifact.outputs.archive }}"

  publish-docs:
    needs: [release]
    if: ${{ needs.release.outputs.published == 'true' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: ./.github/actions/install-dependencies
        name: Install dependencies

      - run: pnpm exec nx run-many -t build --projects=tag:lib

      - name: Build docs
        run: pnpm ci:docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
