name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write # Required for OIDC (trusted publishing)
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: ./.github/actions/install-dependencies
        name: Install dependencies

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm ci:release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-node-binaries:
    needs: release
    if: |
      needs.release.outputs.published == 'true' &&
      contains(needs.release.outputs.publishedPackages, '@contentauth/c2pa-node')
    name: Build native binary for ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    env:
      COREPACK_ENABLE_STRICT: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - name: Show published packages
        run: |
          echo '${{ needs.release.outputs.publishedPackages }}'

      - name: Resolve published c2pa-node version
        shell: bash
        run: |
          # changesets publishes multiple packages per run, so we must select
          # the c2pa-node entry explicitly rather than assume it is index 0.
          version=$(echo '${{ needs.release.outputs.publishedPackages }}' \
            | jq -r '.[] | select(.name == "@contentauth/c2pa-node") | .version')
          if [ -z "$version" ]; then
            echo "::error::Could not find @contentauth/c2pa-node in publishedPackages" >&2
            exit 1
          fi
          echo "PUBLISHED_VERSION=$version" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Install system deps (aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: llvm-tools-preview
          target: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Install Node.js dependencies
        env:
          SKIP_RUST_BUILD: 1
        run: pnpm install --frozen-lockfile

      - name: Build library (aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: packages/c2pa-node
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: |
          mkdir -p generated/${{ matrix.target }}
          pnpm run build:rust --target=${{ matrix.target }}
          cp index.node generated

      - name: Build library
        id: build-library
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        working-directory: packages/c2pa-node
        run: |
          mkdir -p generated/${{ matrix.target }}
          pnpm run build:rust --target=${{ matrix.target }}
          cp index.node generated

      - name: Package artifact
        id: package-artifact
        # This needs to be set so that this works on a Windows runner
        shell: bash
        working-directory: packages/c2pa-node
        env:
          ARCHIVE_FILENAME: c2pa-node_${{ matrix.target }}-v${{ env.PUBLISHED_VERSION || '-dev' }}.zip
        run: |
          cd generated
          7z a -tzip "${{ env.ARCHIVE_FILENAME }}" index.node
          echo "archive=${{ env.ARCHIVE_FILENAME }}" >> "$GITHUB_OUTPUT"

      - id: get-release-id
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # changesets tags releases as "<pkg>@<version>", e.g.
          # "@contentauth/c2pa-node@0.6.2" -- not "v<version>".
          tag="@contentauth/c2pa-node@${PUBLISHED_VERSION}"
          encoded_tag=$(jq -rn --arg t "$tag" '$t|@uri')
          id=$(curl -sSL --fail \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${encoded_tag}" \
            | jq -e '.id')
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        if: needs.release.outputs.published == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sSL --fail \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/zip" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.get-release-id.outputs.id }}/assets?name=${{ steps.package-artifact.outputs.archive }}" \
            --data-binary "@packages/c2pa-node/generated/${{ steps.package-artifact.outputs.archive }}"

  publish-docs:
    needs: [release]
    if: ${{ needs.release.outputs.published == 'true' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: ./.github/actions/install-dependencies
        name: Install dependencies

      - run: pnpm exec nx run-many -t build --projects=tag:lib

      - name: Build docs
        run: pnpm ci:docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
