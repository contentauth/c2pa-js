name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: ./.github/actions/install-dependencies
        name: Install dependencies

      # ubuntu-24.04 runner has google-chrome-stable + chromedriver pre-installed.
      # Point playwright at system Chrome to skip the 167MB download that hangs post-extract.
      - run: pnpm ci:check
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
