name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: ./.github/actions/install-dependencies
        name: Install dependencies

      # Install chrome + chromedriver for vitest + wasm-pack test
      - name: Install headless Chromium + Chromedriver
        working-directory: ./packages/c2pa-web
        run: pnpm exec playwright install --with-deps

      - name: Cache Trustmark models
        id: cache-trustmark-models
        uses: actions/cache@v4
        with:
          path: tmp/trustmark_models
          key: trustmark-models-B-v1

      - name: Download Trustmark models
        if: steps.cache-trustmark-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p tmp/trustmark_models
          BASE="https://cai-watermark.adobe.net/watermarking/trustmark-models"
          curl -fSL "$BASE/encoder_B.onnx" -o tmp/trustmark_models/encoder_B.onnx
          curl -fSL "$BASE/decoder_B.onnx" -o tmp/trustmark_models/decoder_B.onnx

      - run: pnpm ci:check
