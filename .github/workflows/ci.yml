name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: ./.github/actions/install-dependencies
        name: Install dependencies

      # Install playwright's chromium for vitest browser tests
      # wasm-pack uses system chromedriver (pre-installed on ubuntu-24.04 runner)
      - name: Install Playwright Chromium
        working-directory: ./packages/c2pa-web
        run: pnpm exec playwright install chromium

      - run: pnpm ci:check
